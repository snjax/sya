version: 2

project_name: sya

before:
  hooks:
    - sh scripts/bump-plugin-version.sh {{ .Version }}

builds:
  - id: sya
    main: ./cmd/sya
    binary: sya
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: sya
    ids:
      - sya
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
